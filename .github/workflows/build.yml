name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore LTools.sln

      - name: Build
        run: dotnet build LTools.sln --no-restore -c Release

      - name: Test
        run: dotnet test tests/LTools.Tests/LTools.Tests.csproj --no-build -c Release
